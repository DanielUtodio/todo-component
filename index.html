<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Task Manager</title>
</head>
<body>
    <article data-testid="test-todo-card" class="card">
        <h3 data-testid="test-todo-title" id="title">
            Task: Finish frontend task
        </h3>

        <p data-testid="test-todo-description">
            Build a clean todo card UI
        </p>

        <div class="meta">
            <span data-testid="test-todo-priority" class="badge high">
            📈  High
            </span>
        
            <span data-testid="test-todo-status" id="status" class="status">
              In Progress
            </span>
        </div>

        <div class="dates">
            <time data-testid="test-todo-due-date" datetime="2026-04-16">
              Due April 16, 2026
            </time>
            <br />
            <time data-testid="test-todo-time-remaining" id="timeRemaining"></time>
            </div>

            <label class="checkbox">
                <input
                  type="checkbox"
                  id="checkbox"
                  data-testid="test-todo-complete-toggle"
                />
                Mark as complete
            </label>

            <ul data-testid="test-todo-tags" class="tags">
              <li data-testid="test-todo-tag-work">work</li>
              <li data-testid="test-todo-tag-urgent">urgent</li>
            </ul>

            <div class="actions">
              <button data-testid="test-todo-edit-button">Edit</button>
              <button data-testid="test-todo-delete-button">Delete</button>
            </div>
    </article>

    <script src="./script.js"></script>
</body>
</html>
