<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
  <title>Task Manager</title>
</head>
<body>

<article data-testid="test-todo-card" class="card">

  <!-- VIEW MODE -->
  <div id="view-mode">

    <h3 data-testid="test-todo-title" id="title">
      Finish frontend task
    </h3>

    <!-- COLLAPSIBLE -->
    <div id="collapsible" data-testid="test-todo-collapsible-section">
      <p data-testid="test-todo-description" id="desc">
        Build a clean todo card UI
      </p>
    </div>

    <button 
      id="expandBtn"
      data-testid="test-todo-expand-toggle"
      aria-expanded="false"
      aria-controls="collapsible"
    >
      Show more
    </button>

    <div class="meta">

      <span id="priority" data-testid="test-todo-priority" class="badge"></span>

      <select id="statusControl" data-testid="test-todo-status-control">
        <option>Pending</option>
        <option selected>In Progress</option>
        <option>Done</option>
      </select>

      <span data-testid="test-todo-status" id="status" class="status progress">
        In Progress
      </span>
    </div>

    <div class="dates">
      <time data-testid="test-todo-due-date" id="dueDate"></time>
      <br />
      <time data-testid="test-todo-time-remaining" id="timeRemaining" aria-live="polite"></time>
      <br />
      <span id="overdue" data-testid="test-todo-overdue-indicator"></span>
    </div>

    <label class="checkbox">
      <input type="checkbox" id="checkbox" data-testid="test-todo-complete-toggle"/>
      Mark as complete
    </label>

    <ul data-testid="test-todo-tags" class="tags">
      <li data-testid="test-todo-tag-work">work</li>
      <li data-testid="test-todo-tag-urgent">urgent</li>
    </ul>

    <div class="actions">
      <button id="editBtn" data-testid="test-todo-edit-button">Edit</button>
      <button id="deleteBtn" data-testid="test-todo-delete-button">Delete</button>
    </div>

  </div>

  <!-- EDIT MODE -->
  <div data-testid="test-todo-edit-form" id="edit-mode" class="edit-mode hidden">

    <h3 id="edit-title">Edit Task</h3>

    <label for="todo-title">Title</label>
    <input id="todo-title" data-testid="test-todo-edit-title-input"/>

    <label for="description">Description</label>
    <textarea id="description" data-testid="test-todo-edit-description-input"></textarea>

    <label for="edit-priority">Priority</label>
    <select id="edit-priority" data-testid="test-todo-edit-priority-select">
      <option value="low">low</option>
      <option value="medium">medium</option>
      <option value="high">high</option>
    </select>

    <label for="due-date">Due Date</label>
    <input type="date" id="due-date" data-testid="test-todo-edit-due-date-input"/>

    <div class="actions">
      <button id="saveBtn" data-testid="test-todo-save-button">Save</button>
      <button id="cancelBtn" data-testid="test-todo-cancel-button">Cancel</button>
    </div>

  </div>

</article>

<script src="script.js"></script>
</body>
</html>
